name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      MYSQL_HOST: localhost
      MYSQL_PORT: 3306
      MYSQL_USER: ci_user
      MYSQL_PASSWORD: ci_password_123456
      MYSQL_DATABASE: daodejing_platform
      JWT_SECRET: ci-user-secret-1234567890
      ADMIN_JWT_SECRET: ci-admin-secret-1234567890
      HADMIN_INTERNAL_TOKEN: ci-hadmin-token-1234567890
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Backend check
        run: npm run backend:check

      - name: Backend tests (with coverage)
        run: npm run backend:test:coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: warn
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            vue-project/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix vue-project ci

      - name: Frontend lint check
        run: npm run frontend:lint:check

      - name: Frontend type check
        run: npm run frontend:type-check

      - name: Frontend build
        run: npm run frontend:build

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: vue-project/dist/
          if-no-files-found: warn
          retention-days: 7

  frontend-lighthouse:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            vue-project/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix vue-project ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Run Lighthouse CI
        working-directory: vue-project
        run: npm run lighthouse

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci
          path: vue-project/.lighthouseci/
          if-no-files-found: warn
          retention-days: 7

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            vue-project/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix vue-project ci

      - name: Install Playwright browser
        run: npm --prefix vue-project run e2e:install

      - name: Frontend E2E smoke
        run: npm run frontend:e2e

      - name: Frontend E2E stream
        run: npm run frontend:e2e:stream

      - name: Frontend E2E council
        run: npm run frontend:e2e:council

      - name: Frontend E2E scenarios
        run: npm run frontend:e2e:scenarios

      - name: Frontend E2E enterprise (B 端 / leads)
        run: npm run frontend:e2e:enterprise

      - name: Frontend E2E business plan
        run: npm run frontend:e2e:business-plan

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: vue-project/playwright-report/
          if-no-files-found: warn
          retention-days: 14
