<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title> - 登录</title>
    <meta name="keywords" content="">
    <meta name="description" content="">

    <link rel="shortcut icon" href="favicon.ico"> <link href="css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="css/font-awesome.css?v=4.4.0" rel="stylesheet">

    <link href="css/animate.css" rel="stylesheet">
    <link href="css/style.css?v=4.1.0" rel="stylesheet">
    <!--[if lt IE 9]>
    <meta http-equiv="refresh" content="0;ie.html" />
    <![endif]-->
    <script>if(window.top !== window.self){ window.top.location = window.location;}</script>
</head>

<body class="gray-bg">

    <div class="middle-box text-center loginscreen  animated fadeInDown">
        <div>
            <div>

                <h1 class="logo-name">h</h1>

            </div>
            <h3>欢迎使用 hAdmin</h3>

            <form id="adminLoginForm" class="m-t" role="form">
                <div class="form-group">
                    <input id="adminUsername" type="text" class="form-control" placeholder="用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <input id="adminPassword" type="password" class="form-control" placeholder="密码" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="alert alert-danger" style="display:none; margin-bottom: 12px;"></div>
                <button id="adminLoginBtn" type="submit" class="btn btn-primary block full-width m-b">登 录</button>

                <p class="text-muted text-center"><small>道德经平台 · 后台管理</small></p>

            </form>
        </div>
    </div>

    <!-- 全局js -->
    <script src="js/jquery.min.js?v=2.1.4"></script>
    <script src="js/bootstrap.min.js?v=3.3.6"></script>

    <script>
    (function () {
        var form = document.getElementById('adminLoginForm');
        var errorBox = document.getElementById('loginError');
        var submitBtn = document.getElementById('adminLoginBtn');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }
        function clearError() {
            errorBox.textContent = '';
            errorBox.style.display = 'none';
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            clearError();

            var username = document.getElementById('adminUsername').value.trim();
            var password = document.getElementById('adminPassword').value;
            if (!username || !password) {
                showError('请输入账号和密码');
                return;
            }

            submitBtn.disabled = true;
            var originalText = submitBtn.textContent;
            submitBtn.textContent = '登录中...';

            fetch('/api/admin/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function (response) {
                return response.json().then(function (data) {
                    return { ok: response.ok, status: response.status, data: data };
                });
            })
            .then(function (result) {
                if (!result.ok || !result.data || !result.data.success) {
                    var msg = (result.data && result.data.message) || ('登录失败 (' + result.status + ')');
                    showError(msg);
                    return;
                }
                try {
                    localStorage.setItem('hadmin_token', result.data.token || '');
                    localStorage.setItem('hadmin_admin', JSON.stringify(result.data.admin || {}));
                } catch (e) {}
                window.location.href = 'index.html';
            })
            .catch(function (err) {
                showError('网络请求失败：' + (err && err.message ? err.message : err));
            })
            .then(function () {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            });
        });
    })();
    </script>

</body>

</html>
