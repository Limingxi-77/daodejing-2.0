    <script>
    (function () {
        var cached = (window.AdminAPI && AdminAPI.getAdmin()) || {};
        var nameEl = document.getElementById('currentAdminName');

        function renderAdmin(a) {
            if (!nameEl || !a) return;
            var name = a.display_name || a.username || '管理员';
            var role = a.role_code ? ' · ' + a.role_code : '';
            nameEl.textContent = name + role;
        }
        renderAdmin(cached);

        if (window.AdminAPI && AdminAPI.apiFetch) {
            AdminAPI.apiFetch('/api/admin/auth/me').then(function (result) {
                if (result && result.admin) {
                    try { localStorage.setItem('hadmin_admin', JSON.stringify(result.admin)); } catch (e) {}
                    renderAdmin(result.admin);
                }
            }).catch(function (err) {
                if (err && (err.status === 401 || err.status === 403 || err.status === 404)) {
                    AdminAPI.logout();
                }
            });
        }

        var logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function () {
                if (typeof layer !== 'undefined' && layer.confirm) {
                    layer.confirm('确定要退出登录吗？', { btn: ['确定', '取消'] }, function (idx) {
                        layer.close(idx);
                        AdminAPI.logout();
                    });
                } else if (window.confirm('确定要退出登录吗？')) {
                    AdminAPI.logout();
                }
            });
        }
    })();
    </script>
