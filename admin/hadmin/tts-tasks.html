<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS 任务 - 道德经平台</title>

    <link rel="shortcut icon" href="favicon.ico">
    <link href="css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="css/font-awesome.min.css?v=4.4.0" rel="stylesheet">
    <link href="css/animate.css" rel="stylesheet">
    <link href="css/style.css?v=4.1.0" rel="stylesheet">

    <script src="js/admin-api.js"></script>
    <script>AdminAPI.requireAuth();</script>
</head>

<body class="gray-bg">
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5><i class="fa fa-volume-up"></i> TTS 任务</h5>
                    </div>
                    <div class="ibox-content">
                        <form id="filterForm" class="form-inline" style="margin-bottom: 10px;">
                            <div class="form-group">
                                <label>状态：</label>
                                <select id="filterStatus" class="form-control">
                                    <option value="">全部</option>
                                    <option value="pending">待处理</option>
                                    <option value="processing">处理中</option>
                                    <option value="completed">已完成</option>
                                    <option value="failed">失败</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">筛选</button>
                            <button type="button" id="btnReload" class="btn btn-default"><i class="fa fa-refresh"></i> 刷新</button>
                        </form>

                        <div id="ttsError" class="alert alert-danger" style="display:none;"></div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>文本</th>
                                        <th>语音</th>
                                        <th>速度/音量</th>
                                        <th>状态</th>
                                        <th>音频</th>
                                        <th>创建时间</th>
                                        <th style="width: 220px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="ttsBody">
                                    <tr><td colspan="7" class="text-center text-muted">加载中…</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div id="ttsPagination"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.min.js?v=2.1.4"></script>
    <script src="js/bootstrap.min.js?v=3.3.6"></script>
    <script src="js/plugins/layer/layer.min.js"></script>

    <script>
    (function () {
        var state = { page: 1, pageSize: 20, status: '' };
        var cache = {};

        function statusLabel(s) {
            if (s === 'completed') return '<span class="label label-primary">已完成</span>';
            if (s === 'processing') return '<span class="label label-info">处理中</span>';
            if (s === 'failed') return '<span class="label label-danger">失败</span>';
            if (s === 'pending') return '<span class="label label-warning">待处理</span>';
            return '<span class="label label-default">' + AdminAPI.escapeHtml(s || '-') + '</span>';
        }

        function truncate(s, n) {
            s = s || '';
            return s.length > n ? AdminAPI.escapeHtml(s.slice(0, n)) + '…' : AdminAPI.escapeHtml(s);
        }

        function renderRow(t) {
            cache[t.id] = t;
            var audioCell = t.audioUrl
                ? '<a href="' + AdminAPI.escapeHtml(t.audioUrl) + '" target="_blank"><i class="fa fa-play-circle"></i> 试听</a>'
                : '<small class="text-muted">-</small>';
            var actions = '<button class="btn btn-xs btn-default btn-view">查看</button> ';
            if (t.status === 'failed' || t.status === 'pending') {
                actions += '<button class="btn btn-xs btn-warning btn-mark" data-target="processing">置为处理中</button> ';
            }
            if (t.status !== 'completed') {
                actions += '<button class="btn btn-xs btn-success btn-mark" data-target="completed">标记完成</button>';
            }
            return '<tr data-id="' + AdminAPI.escapeHtml(t.id) + '">' +
                '<td title="' + AdminAPI.escapeHtml(t.text || '') + '">' + truncate(t.text, 40) + '</td>' +
                '<td>' + AdminAPI.escapeHtml(t.voice || '-') + '</td>' +
                '<td><small>速 ' + (t.speed || 1) + ' · 音 ' + (t.volume || 1) + '</small></td>' +
                '<td>' + statusLabel(t.status) + '</td>' +
                '<td>' + audioCell + '</td>' +
                '<td>' + AdminAPI.formatDate(t.createdAt) + '</td>' +
                '<td>' + actions + '</td>' +
                '</tr>';
        }

        function load() {
            var q = AdminAPI.qs({ page: state.page, pageSize: state.pageSize, status: state.status });
            AdminAPI.apiFetch('/api/admin/tts/tasks?' + q)
                .then(function (result) {
                    cache = {};
                    var rows = result.data || [];
                    var body = document.getElementById('ttsBody');
                    body.innerHTML = rows.length === 0
                        ? '<tr><td colspan="7" class="text-center text-muted">暂无任务</td></tr>'
                        : rows.map(renderRow).join('');
                    AdminAPI.renderPagination('#ttsPagination', result.pagination, function (p) {
                        state.page = p; load();
                    });
                    AdminAPI.showError('#ttsError', '');
                })
                .catch(function (err) {
                    AdminAPI.showError('#ttsError', '加载失败：' + (err && err.message ? err.message : err));
                });
        }

        function patchTask(id, body) {
            return AdminAPI.apiFetch('/api/admin/tts/tasks/' + encodeURIComponent(id), {
                method: 'PATCH',
                body: body
            }).then(function () {
                AdminAPI.notify('已更新', 'success');
                load();
            }).catch(function (err) {
                AdminAPI.notify('操作失败：' + (err && err.message ? err.message : err), 'error');
            });
        }

        function openDetail(id) {
            var t = cache[id];
            if (!t) return;
            var meta = '';
            try { meta = JSON.stringify(t.metadata || {}, null, 2); } catch (e) { meta = String(t.metadata); }
            var html = '<div style="padding: 18px;">' +
                '<dl class="dl-horizontal">' +
                '<dt>任务 ID</dt><dd><code>' + AdminAPI.escapeHtml(t.id) + '</code></dd>' +
                '<dt>用户 ID</dt><dd><code>' + AdminAPI.escapeHtml(t.userId || '-') + '</code></dd>' +
                '<dt>语音</dt><dd>' + AdminAPI.escapeHtml(t.voice || '-') + '</dd>' +
                '<dt>速度 / 音量</dt><dd>' + (t.speed || 1) + ' / ' + (t.volume || 1) + '</dd>' +
                '<dt>状态</dt><dd>' + statusLabel(t.status) + '</dd>' +
                '<dt>音频 URL</dt><dd>' + (t.audioUrl
                    ? '<a href="' + AdminAPI.escapeHtml(t.audioUrl) + '" target="_blank">' + AdminAPI.escapeHtml(t.audioUrl) + '</a>'
                    : '-') + '</dd>' +
                '<dt>错误信息</dt><dd>' + (t.errorMessage
                    ? '<span class="text-danger">' + AdminAPI.escapeHtml(t.errorMessage) + '</span>'
                    : '-') + '</dd>' +
                '<dt>创建 / 更新</dt><dd><small>' + AdminAPI.formatDate(t.createdAt) + ' / ' +
                    AdminAPI.formatDate(t.updatedAt) + '</small></dd>' +
                '</dl>' +
                '<h5>文本内容</h5>' +
                '<pre style="max-height:160px;overflow:auto;">' + AdminAPI.escapeHtml(t.text || '') + '</pre>' +
                '<h5>Metadata</h5>' +
                '<pre style="max-height:140px;overflow:auto;">' + AdminAPI.escapeHtml(meta) + '</pre>' +
                '</div>';
            layer.open({
                type: 1,
                title: 'TTS 任务详情',
                area: ['640px', '600px'],
                content: html,
                btn: ['关闭']
            });
        }

        jQuery(function () {
            jQuery('#filterForm').on('submit', function (e) {
                e.preventDefault();
                state.status = jQuery('#filterStatus').val();
                state.page = 1; load();
            });
            jQuery('#btnReload').on('click', function () { load(); });
            jQuery('#ttsBody').on('click', '.btn-view', function () {
                openDetail(jQuery(this).closest('tr').data('id'));
            }).on('click', '.btn-mark', function () {
                var id = jQuery(this).closest('tr').data('id');
                var target = jQuery(this).data('target');
                patchTask(id, { status: target });
            });
            load();
        });
    })();
    </script>
</body>

</html>
